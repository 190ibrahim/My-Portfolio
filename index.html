        var key = "portfolioAnalyticsOptOut";

            window.localStorage.setItem(key, "1");
          } else if (analyticsSetting === "on") {
            window.localStorage.removeItem(key);
          }

          if (analyticsSetting === "off" || analyticsSetting === "on") {
            params.delete("analytics");
            var cleanQuery = params.toString();
            var cleanUrl = window.location.pathname + (cleanQuery ? "?" + cleanQuery : "") + window.location.hash;

          }

          window.portfolioAnalyticsDisabled = window.localStorage.getItem(key) === "1";
        } catch (error) {
          window.portfolioAnalyticsDisabled = analyticsSetting === "off";
        }
      })();
